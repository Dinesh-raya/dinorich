services:
  dino-richup:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/persistence:/app/backend/persistence
    restart: unless-stopped
    environment:
      - DINO_SECRET_KEY=${DINO_SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}
      - DINO_CORS_ORIGINS=${DINO_CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
